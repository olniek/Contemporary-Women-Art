name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci
        env:
          # Avoid picking up a browser cache from another OS/architecture
          PLAYWRIGHT_BROWSERS_PATH: ""

      - name: Test
        run: npm test
        env:
          CI: true
          PLAYWRIGHT_BROWSERS_PATH: ""
